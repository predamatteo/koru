name: koru
description: "Koru — minimalist launcher and mindful blocker"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Key-Value Storage
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.3.1

  # UI & Charts
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2

  # Modeling
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Utilities
  async: ^2.13.0
  uuid: ^4.5.1
  permission_handler: ^12.0.1
  intl: ^0.20.2
  collection: ^1.19.1
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.4

  # Code generation
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  hive_ce_generator: ^1.8.2
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/presets/

  fonts:
    - family: Goldman
      fonts:
        - asset: assets/fonts/Goldman-Regular.ttf
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
    - family: ArchitectsDaughter
      fonts:
        - asset: assets/fonts/ArchitectsDaughter-Regular.ttf
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.ttf
